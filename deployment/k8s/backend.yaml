apiVersion: apps/v1
kind: Deployment
metadata:
  name: shank-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shank-backend
  template:
    metadata:
      labels:
        app: shank-backend
    spec:
      containers:
        - name: backend
          image: shank/backend:1.0.0
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: shank-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: shank-backend
spec:
  selector:
    app: shank-backend
  ports:
    - port: 8000
      targetPort: 8000

